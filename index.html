<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APP CDO</title>
    
    <!-- FIX: Ajustar viewport y estilos cuando está dentro de iframe (Apps Script en Chrome) -->
    <script>
      if (window.self !== window.top) {
        function fixViewport() {
          const meta = document.querySelector('meta[name=viewport]');
          if (meta) {
            meta.setAttribute(
              'content',
              'width=' + window.innerWidth + ', initial-scale=1.0, maximum-scale=1.0'
            );
          }
          document.documentElement.style.fontSize = "16px";
        }
        window.addEventListener('resize', fixViewport);
        fixViewport();
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        width: 100% !important;
        max-width: 100% !important;
        height: 100vh;
        overflow-x: hidden;
      }

      /* --- START: ROBUST LAYOUT FIX --- */
      body {
        display: flex;
        flex-direction: column;
        transform: none !important; /* Evitar escalado en Chrome */
        zoom: 1 !important;         /* Evitar zoom forzado */
      }
      #root {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      /* --- END: ROBUST LAYOUT FIX --- */

      /* Ocultar banner dev de Apps Script */
      body > div:first-child[style*="position: fixed"] {
        display: none !important;
      }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.1.1",
        "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.7.1",
        "react/": "https://esm.sh/react@^19.1.1/",
        "@google/genai": "https://esm.sh/@google/genai@^1.11.0",
        "xlsx": "https://esm.sh/xlsx@^0.18.5",
        "vite": "https://esm.sh/vite@^7.0.6",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^4.7.0",
        "vite-plugin-singlefile": "https://esm.sh/vite-plugin-singlefile@^2.3.0"
      }
    }
    </script>
  </head>
  <body class="text-zinc-200 bg-[rgb(65,64,64)]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
